<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./index.css">
    <title>Random Dice Game</title>
    <script src="./index.js" defer></script>
</head>
<body>
    <header>
        <h1>WELCOME TO OUR RANDOM DICE GAME!!</h1>
    </header>
    <section id="ruleList">
        <h3>The Rules Are As Follows ...</h3>
        <p>
            <ol>
                <li> Guess a Number Between 1 & 6</li>
                <li> Click 'Roll Dice!'</li>
                <li id="warning"> BEWARE - 7 Wrong Guesses, GAME OVER.....</li>
            </ol>
        </p>
    </section>
    <main>
        <section id="form">
            <form>
                <label for="guessNumber">Enter a Number Between 1 & 6:</label><br>
                <input type="text" name="guessNumber" required>
                <button id="guessSubmit">
                    Roll Dice!
                </button>
            </form>
        </section>

        <section>
            <h2 id ="outcomeMessage"></h2>
        </section>

        <section>
            <h2>Guess Count</h2>
            <h3 id="rightGuess">Right Guesses: 0</h3>
            <h3 id ="wrongGuess">Wrong Guesses: 0</h3>
        </section>

        <section id="diceImage">
            <img id="dice" src="./assets/initial_dice.png" alt="picture of dice">
        </section>
    </main>
    <footer><p>Check Out The Git Repo: <a href = https://github.com/ash-g773/random-dice-game/tree/main> Here</p></footer>
</body>
</html>
